<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Challenges</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --surface: #fafafa;
            --border: #e5e5e5;
            --text: #111111;
            --muted: #666666;
        }

        body {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
                "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .container {
            width: min(720px, 100%);
        }

        .header {
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.04em;
        }

        .header p {
            margin-top: .5rem;
            color: var(--muted);
            font-size: .95rem;
        }

        .projects {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .project {
            display: flex;
            justify-content: space-between;
            align-items: center;

            text-decoration: none;
            color: inherit;

            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;

            padding: 1.15rem 1.4rem;

            transition: 0.2s ease;
        }

        .project:hover {
            background: #fff;
            border-color: #111;
            transform: translateY(-2px);
        }

        .left h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .left p {
            margin-top: .3rem;
            font-size: .9rem;
            color: var(--muted);
        }

        .arrow {
            font-size: 1.25rem;
            transition: transform .2s ease;
        }

        .project:hover .arrow {
            transform: translateX(4px);
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--muted);
            font-size: .85rem;
        }
    </style>
</head>
<body>

<div class="container">

    <header class="header">
        <h1>COSC HackWeek 2026 Submissions</h1>
        <p>Deployed Solutions.</p>
    </header>

    <section class="projects">

        <a class="project" href="./CGPA%20Calculator/">
            <div class="left">
                <h2>CGPA Calculator</h2>
                <p>Semester GPA, CGPA & What-If Simulator</p>
            </div>
            <div class="arrow">→</div>
        </a>

        <a class="project" href="https://kanban-board-htxwqq79g-ssrithwik.vercel.app/">
            <div class="left">
                <h2>Kanban Board</h2>
                <p>A Trello style kanban board</p>
            </div>
            <div class="arrow">→</div>
        </a>

    </section>

    <footer>
        Made by Rithwik.
    </footer>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Metadata Inspector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
    <script src="https://unpkg.com/dropzone@6.0.0-beta.2/dist/dropzone-min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/dropzone@6.0.0-beta.2/dist/dropzone.css"/>
</head>
<body class="min-h-screen bg-slate-100 bg-[linear-gradient(to_right,#94a3b810_1px,transparent_1px),linear-gradient(to_bottom,#94a3b810_1px,transparent_1px)] bg-[size:28px_28px]">

    <main class="max-w-7xl mx-auto px-5 py-10">

        <!-- Heading -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-extrabold text-slate-800">
                File Metadata Inspector
            </h1>

            <p class="mt-4 text-slate-500 text-lg">
                Upload an Image or PDF to inspect its metadata instantly.
            </p>
        </div>

        <!-- Upload -->
        <div
            id="dropZone"
            class="cursor-pointer transition-all duration-300
            border-2 border-dashed border-slate-300
            rounded-3xl
            bg-white/70 backdrop-blur
            shadow-lg
            hover:shadow-2xl
            hover:border-blue-500
            p-10
            flex flex-col items-center justify-center gap-5">

            <h2 class="text-2xl font-semibold text-slate-700 text-center">
                Drag & Drop your file here
            </h2>

            <p class="text-slate-500">
                Supports Images and PDF documents
            </p>

            <button
                id="browseBtn"
                class="bg-blue-600 text-white px-6 py-3 rounded-xl
                hover:bg-blue-700 transition font-semibold shadow">

                Browse Files
            </button>

            <input
                type="file"
                id="fileInput"
                class="hidden"
                accept="image/*,.pdf"
            />
        </div>

        <!-- Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">

            <!-- Preview -->
            <section
                class="bg-white rounded-3xl shadow-lg p-6">

                <h2 class="text-2xl font-bold mb-6 text-slate-800">
                    🖼 Preview
                </h2>

                <div
                    id="preview"
                    class="min-h-[450px]
                    flex items-center justify-center
                    rounded-2xl
                    border
                    border-slate-200
                    bg-slate-50
                    overflow-auto">

                    <p class="text-slate-400">
                        No preview available
                    </p>

                </div>

            </section>

            <!-- Metadata -->
            <section
                class="bg-white rounded-3xl shadow-lg p-6">

                <h2 class="text-2xl font-bold mb-6 text-slate-800">
                    📋 Metadata
                </h2>

                <div
                    id="metadata"
                    class="min-h-[450px] space-y-5">

                    <p class="text-slate-400">
                        Upload a file to inspect metadata.
                    </p>

                </div>

            </section>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
